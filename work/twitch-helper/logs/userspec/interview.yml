# Interview Plan for Feature Planning
#
# Tracks progress of adaptive discovery interview for a new feature/bug/refactoring.
# Updated after EACH user response with scoring, values, and remaining gaps.
#
# Scoring: 0-100% (how well we understand this aspect)
# Status: pending → partial → complete
# Required: true = must reach threshold, false = cover if relevant

# ============================================================================
# Interview Metadata (Session Recovery)
# ============================================================================
interview_metadata:
  started: "2026-04-13 23:30:00"
  last_updated: "2026-04-13 23:30:00"
  status: "completed"
  can_resume: true
  current_question_num: 0
  feature_size: "L"

# ============================================================================
# Conversation History (for session recovery)
# ============================================================================
# Preserves complete Q&A. Update after EVERY user response.
#
conversation_history:
  - question_num: 1
    timestamp: "2026-04-13 23:35:00"
    topic: "setup_flow, slots, ui, media_playback"
    agent_question: |
      1. Как выглядит настройка приложения?
      2. Сколько наград одновременно нужно поддерживать?
      3. Что показывает приложение во время стрима?
      4. Где воспроизводится медиа?
    user_answer: |
      1. Флоу верный. Возможно через приложение тоже можно создавать награды — надо проверить Twitch API.
      2. Максимально 5 слотов. Типы: маска Snap Camera, конкретный медиафайл, рандомный из папки.
      3. UI с настройками + короткий лог кто что купил (список).
      4. Видео со звуком. Воспроизводится через OBS Browser Source.
    summary: "Флоу настройки подтверждён. 5 слотов MVP. UI = настройки + лог. Медиа через OBS Browser Source."
  - question_num: 2
    timestamp: "2026-04-13 23:40:00"
    topic: "queue, snap_camera_binding, media_formats, error_handling"
    agent_question: |
      1. Очередь воспроизведения при одновременных redemptions?
      2. Привязка hotkey Snap Camera — ручная или автоматическая?
      3. Форматы и ограничения медиафайлов?
      4. Что происходит при ошибках (Snap Camera не запущена, файл удалён)?
    user_answer: |
      1. Очередь — один за другим.
      2. Пользователь создаёт награду, в приложении вручную привязывает маску к награде. Маски меняет по желанию.
      3. Всё что лежит в папке или указано прямым путём — воспроизводится без ограничений.
      4. Snap Camera не запущена — пользователь сам увидит (нет вебки). Ошибки файлов — в логе заказов статус зелёный/красный, при наведении на красный — расшифровка ошибки.
    summary: "Очередь подтверждена. Привязка масок ручная в приложении. Любые форматы. Лог с цветными статусами и тултипами ошибок."
  - question_num: 3
    timestamp: "2026-04-13 23:45:00"
    topic: "snap_camera_ui, obs_url, session, autostart"
    agent_question: |
      1. Как пользователь выбирает маску — из списка snap-camera-server или вручную ID?
      2. Browser Source URL — кнопка копирования или просто текст?
      3. Auto-fulfill redemptions — автоматически после воспроизведения или вручную?
      4. Сессия и автозапуск при старте Windows?
    user_answer: |
      1. Вариант A (список из snap-camera-server) если несложно, иначе B (ввод ID).
      2. Просто текст с URL достаточно.
      3. Автоматически: успех → fulfill (подтвердить), ошибка → refund (вернуть баллы).
      4. Токен сохраняется, при запуске сразу подключён. Автозапуск не нужен, запускает вручную.
    summary: "Snap Camera — вариант A предпочтителен. URL текстом. Нет автозапуска, токен сохраняется. Auto-fulfill: успех→fulfill, ошибка→cancel+refund."
  - question_num: 5
    timestamp: "2026-04-13 23:55:00"
    topic: "reconnect, slot_edit, empty_folder, queue_limit"
    agent_question: |
      1. Потеря соединения с Twitch — автореконнект тихо или с уведомлением?
      2. Редактирование слота или только удалить+создать?
      3. Пустая папка → refund + красный лог, достаточно?
      4. Лимит очереди?
    user_answer: |
      1. Уведомление "Соединение потеряно, переподключаюсь..." + авто-реконнект.
      2. Только удалить и создать новый (проще).
      3. Да, достаточно.
      4. Лимиты через настройки самой награды в Twitch (cooldown, раз в час и т.п.). При создании награды в приложении — указывать эти параметры сразу.
    summary: "Реконнект с уведомлением. Слоты без редактирования. Cooldown через Twitch reward settings при создании."
  - question_num: 8
    timestamp: "2026-04-14 00:10:00"
    topic: "tech_stack, affiliate, mask_duration, snap_camera_mechanism"
    agent_question: |
      1. Технологический стек?
      2. Twitch Affiliate или Partner?
      3. Маска в очереди — мгновенно или с паузой?
      4. Snap Camera — SendInput или API?
    user_answer: |
      1. Electron (TypeScript).
      2. Affiliate.
      3. Маска висит 30 секунд, затем снимается — лицо без маски. Если в очереди две маски — вторая начинается после истечения 30 сек первой.
      4. Подтверждает SendInput с hotkey.
    summary: "Electron. Affiliate — Channel Points API доступен. Маска 30 сек затем снимается (no mask). SendInput подтверждён."
  - question_num: 4
    timestamp: "2026-04-13 23:50:00"
    topic: "success_criteria, slot_toggle, constraints"
    agent_question: |
      1. Что значит MVP готов?
      2. Можно ли отключать слоты не удаляя?
      3. Windows версия и права администратора?
    user_answer: |
      1. Залогинился, настроил по одной награде каждого типа, всё работает без сбоев.
      2. Да, добавить в MVP — toggle включить/выключить слот.
      3. Windows 11 у него, делаем как лучше (Windows 10+). Без лишних требований.
    summary: "MVP критерии подтверждены. Toggle слотов в MVP. Windows 10+ без требований к admin правам."
