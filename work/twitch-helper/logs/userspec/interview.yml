# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
# Interview Cycle 2 scope (together with Phase 3)
phase2_user_experience:

  user_stories:
    score: 90
    status: "complete"
    value: |
      1. Первый запуск: логин через Twitch → главный экран с секциями Snap Camera / Media
      2. Добавление слота: выбор типа (Маска/Медиафайл/Мем) → создать или выбрать награду Twitch (с cooldown) → настройка → сохранить → toggle вкл/выкл
      3. Удаление слота: удалить → создать заново
      4. Во время стрима: зритель выкупает → очередь FIFO → воспроизведение в OBS overlay (случайная позиция+угол, фикс размер) / переключение маски → fulfill или cancel → лог со статусом
      5. Потеря соединения: уведомление → авто-реконнект → продолжение работы
    gaps: ""
    required: true

  acceptance_criteria:
    score: 90
    status: "complete"
    value: |
      - Логин через Twitch, токен сохраняется между запусками
      - Создание награды Twitch из приложения с cooldown-настройками
      - Слот Маска: переключает маску в Snap Camera через hotkey (с подсказкой как настроить в Snap Camera)
      - Слот Медиафайл: воспроизводит видео в OBS Browser Source (случайная позиция+угол, фикс размер)
      - Слот Рандомный мем: воспроизводит случайный файл из папки в OBS Browser Source (случайная позиция+угол, фикс размер)
      - Очередь: несколько выкупов играют по порядку
      - Успешный выкуп → fulfill (баллы списаны)
      - Ошибочный выкуп → cancel (баллы возвращены) + красный статус в логе с тултипом
      - Toggle вкл/выкл слота без удаления настроек
      - При потере Twitch-соединения: уведомление + авто-реконнект
      - Overlay прозрачный когда нет воспроизведения
      - config.json сохраняется между перезапусками exe
    gaps: ""
    required: true

  edge_cases:
    score: 95
    status: "complete"
    value: "Одновременные redemptions → очередь FIFO. Файл не найден → cancel+refund+красный лог. Пустая папка → cancel+refund+красный лог. Нет лимита очереди в приложении — лимиты задаются через cooldown/ограничения Twitch reward при создании. Маска длится 30 сек, затем снимается (лицо без маски). Две маски подряд → вторая применяется после 30 сек первой."
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: "Файл не найден → refund+красный лог с тултипом. Snap Camera не запущена → пользователь видит сам. Overlay закрыт → прозрачный фон. Потеря Twitch-соединения → уведомление 'Переподключаюсь...' + авто-реконнект. Ошибка создания награды → показать ошибку в UI."
    gaps: ""
    required: true

  verification_strategy:
    score: 90
    status: "complete"
    value: "Ручная проверка: логин → создать награду → выкупить с другого аккаунта → видео в OBS → выкупить сломанный слот → refund + красный лог."
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 80
    status: "complete"
    value: "Главный экран: секции Snap Camera и Media. Лог событий: время/ник/награда/статус 🟢🔴 с тултипом ошибки. URL для OBS текстом. Portable exe."
    gaps: ""
    required: false

  risks:
    score: 85
    status: "complete"
    value: "Twitch API изменения — только личное использование, готов к нюансам. Snap Camera не запущена — видит сам. Потеря соединения — авто-реконнект + уведомление. Файлы недоступны — refund + лог. Автообновление — нужно."
    gaps: ""
    required: true

  technical_decisions:
    score: 95
    status: "complete"
    value: "Стек: Electron (TypeScript). Snap Camera — SendInput hotkey (snap-camera-server не умеет переключать маску). Список линз — из snap-camera-server API (вариант A). Overlay через локальный HTTP+WebSocket. Auto-fulfill/cancel через Twitch API. Пользователь Affiliate — Channel Points API доступен. Маска висит 30 секунд в очереди. Автообновление — не в MVP."
    gaps: ""
    required: false

  deploy_approach:
    score: 90
    status: "complete"
    value: "Портативный .exe, скачивается и запускается. Нет инсталлятора, нет CI/CD деплоя."
