name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Twitch credentials
        shell: pwsh
        run: |
          $content = "export const TWITCH_CLIENT_ID = '${{ secrets.TWITCH_CLIENT_ID }}';" + "`n"
          $content += "export const TWITCH_CLIENT_SECRET = '${{ secrets.TWITCH_CLIENT_SECRET }}';"
          Set-Content -Path src/main/twitch/twitch-creds.ts -Value $content -Encoding utf8

      - name: Build
        run: npm run build:main && npm run build:renderer

      - name: Package and publish
        run: npx electron-builder --win portable --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (draft → public)
        shell: bash
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
