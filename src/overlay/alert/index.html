<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TTWeaks Follower Alert</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Comic Sans MS', 'Marker Felt', system-ui, sans-serif;
  }
  body.with-bg {
    background:
      linear-gradient(180deg, #5a8fcf 0%, #8ab8e8 60%, #c8e0f5 100%);
  }
  body.with-bg::after {
    content: '';
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 14%;
    background: linear-gradient(180deg, rgba(80,120,60,0) 0%, rgba(80,120,60,0.5) 60%, rgba(60,90,40,0.85) 100%);
    pointer-events: none;
  }

  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    overflow: visible;
    pointer-events: none;
  }

  .sticker {
    filter:
      drop-shadow(0 0 0 #fff)
      drop-shadow(0 0 0 #fff)
      drop-shadow(0 0 0 #fff);
  }

  #hero {
    position: absolute;
    width: 280px;
    height: 380px;
    left: 0;
    top: 0;
    will-change: transform;
    transform: translate(-9999px, -9999px);
  }
  #hero svg { width: 100%; height: 100%; overflow: visible; display: block; }

  #bubble {
    position: absolute;
    left: 0;
    top: 0;
    width: 420px;
    height: 180px;
    transform: translate(-9999px, -9999px);
    opacity: 0;
    will-change: transform, opacity;
    pointer-events: none;
  }
  #bubble svg { width: 100%; height: 100%; overflow: visible; display: block; }
  #bubble .bubble-text {
    font-family: 'Comic Sans MS', 'Marker Felt', system-ui, sans-serif;
    font-weight: 900;
    text-anchor: middle;
    paint-order: stroke fill;
    stroke: #000;
    stroke-width: 2;
    fill: #111;
  }
  #bubble .bubble-nick {
    font-size: 52px;
    fill: #ff2e7e;
    stroke: #000;
    stroke-width: 4;
  }
  #bubble .bubble-sub {
    font-size: 26px;
    fill: #1a1a1a;
    stroke: #fff;
    stroke-width: 0;
  }

  .loot {
    position: absolute;
    width: 110px;
    height: 110px;
    transform-origin: center bottom;
    will-change: transform, opacity;
    opacity: 0;
  }
  .loot svg { width: 100%; height: 100%; overflow: visible; display: block; }

  .dust {
    position: absolute;
    width: 140px;
    height: 60px;
    pointer-events: none;
    opacity: 0;
    will-change: opacity, transform;
  }

  #test-panel {
    position: fixed;
    bottom: 18px;
    right: 18px;
    background: rgba(20,20,28,0.92);
    color: #fff;
    border: 2px solid #ff2e7e;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 13px;
    z-index: 9999;
    display: none;
    width: 280px;
    pointer-events: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  #test-panel.visible { display: block; }
  #test-panel h3 {
    margin: 0 0 10px 0;
    font-size: 12px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #ff2e7e;
    font-family: inherit;
  }
  #test-panel input[type="text"] {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    background: #0c0c12;
    border: 1px solid #333;
    color: #fff;
    border-radius: 6px;
    font: inherit;
    margin-bottom: 8px;
  }
  #test-panel button {
    width: 100%;
    padding: 10px;
    background: #ff2e7e;
    color: #fff;
    border: 0;
    border-radius: 6px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .12em;
  }
  #test-panel button:hover { background: #ff5599; }
  #test-panel .row { display: flex; gap: 6px; }
  #test-panel .row button { flex: 1; padding: 6px; font-size: 11px; }
  #test-panel .muted { opacity: .6; font-size: 11px; margin-top: 8px; line-height: 1.4; }
  #test-panel .queue {
    margin-top: 8px;
    font-size: 11px;
    opacity: .8;
  }

  #hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,.5);
    font: 600 14px/1.4 ui-monospace, Menlo, monospace;
    text-align: center;
    pointer-events: none;
    background: rgba(0,0,0,.4);
    padding: 14px 20px;
    border-radius: 8px;
    border: 1px dashed rgba(255,255,255,.25);
  }
  #hint.hide { display: none; }
</style>

<script src="./alert-engine.js"></script>
<script>
(function () {
  'use strict';
  // WebSocket connection to TTWeaks app — receives fire_alert and alert_config messages
  const WS_URL = 'ws://127.0.0.1:7891/ws';
  const GROUP_ID = '__alert__';
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      scheduleReconnect();
      return;
    }

    ws.addEventListener('open', () => {
      ws.send(JSON.stringify({ type: 'register', groupId: GROUP_ID }));
      console.log('[alert] WS connected, registered as', GROUP_ID);
    });

    ws.addEventListener('message', (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      if (msg.type === 'fire_alert' && msg.nick) {
        window.fireFollowerAlert(msg.nick);
      } else if (msg.type === 'alert_config' && msg.config) {
        window.applyAlertConfig && window.applyAlertConfig(msg.config);
      }
    });

    ws.addEventListener('close', scheduleReconnect);
    ws.addEventListener('error', () => { /* close fires next */ });
  }

  function scheduleReconnect() {
    ws = null;
    reconnectTimer = setTimeout(connect, 3000);
  }

  connect();
})();
</script>
