<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Twitch Follower Alert — Paratrooper</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: transparent;
    font-family: 'Black Ops One', 'Impact', sans-serif;
  }
  body.with-bg {
    background: linear-gradient(180deg, #6da4d9 0%, #a3cae5 60%, #d4e5f0 100%);
  }
  body.with-bg::after {
    content: ''; position: fixed; left: 0; right: 0; bottom: 0; height: 14%;
    background: linear-gradient(180deg, rgba(80,120,60,0) 0%, rgba(80,120,60,0.5) 60%, rgba(60,90,40,0.85) 100%);
    pointer-events: none;
  }

  #stage {
    position: relative; width: 1920px; height: 1080px;
    transform-origin: top left; overflow: visible; pointer-events: none;
  }

  #hero {
    position: absolute; width: 280px; height: 380px; left: 0; top: 0;
    will-change: transform; transform: translate(-9999px, -9999px);
  }
  #hero svg { width: 100%; height: 100%; overflow: visible; display: block; }

  #shadow {
    position: absolute; width: 180px; height: 32px;
    transform: translate(-9999px, -9999px); pointer-events: none;
    will-change: transform, opacity;
  }
  #shadow svg { width: 100%; height: 100%; overflow: visible; display: block; }

  #smoke-container {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  #rope {
    position: absolute; left: 0; top: 0; width: 110px; height: 1200px;
    transform: translate(-9999px, -9999px); will-change: transform;
    pointer-events: none;
  }
  #rope svg { width: 100%; height: 100%; overflow: visible; display: block; }

  #status {
    position: absolute; left: 0; top: 0;
    transform: translate(-9999px, -9999px);
    font-family: 'Black Ops One', 'Impact', sans-serif;
    font-size: 30px; color: #d8e8c8; letter-spacing: 0.12em;
    text-transform: uppercase; pointer-events: none;
    text-shadow:
      3px 3px 0 #000,
      -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
      0 0 12px rgba(0,0,0,.6);
    white-space: nowrap;
    will-change: transform, opacity;
  }
  #status .dots { display: inline-block; width: 1.6em; text-align: left; }

  #nickname {
    position: absolute; left: 0; top: 0;
    transform: translate(-9999px, -9999px);
    font-family: 'Black Ops One', 'Impact', sans-serif;
    font-size: 56px; color: #fff;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center; pointer-events: none;
    text-shadow:
      4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
      0 0 22px rgba(0, 0, 0, .8), 0 0 6px rgba(0,0,0,.9);
    will-change: transform, opacity;
    opacity: 0;
  }
  #nickname .sub {
    display: block; font-size: 22px; letter-spacing: 0.18em;
    color: #c8d4a8; margin-top: 4px;
    font-family: 'Special Elite', 'Courier New', monospace;
  }

  .loot {
    position: absolute; width: 110px; height: 110px;
    transform-origin: center bottom; will-change: transform, opacity; opacity: 0;
  }
  .loot svg { width: 100%; height: 100%; overflow: visible; display: block; }

  #test-panel {
    position: fixed; bottom: 18px; right: 18px;
    background: rgba(20,20,28,0.92); color: #fff;
    border: 2px solid #5a8c3a; border-radius: 12px;
    padding: 14px 16px; font-family: ui-monospace, Menlo, monospace;
    font-size: 13px; z-index: 9999; display: none; width: 280px;
    pointer-events: auto; box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  #test-panel.visible { display: block; }
  #test-panel h3 {
    margin: 0 0 10px 0; font-size: 12px; letter-spacing: .15em;
    text-transform: uppercase; color: #8db84a; font-family: inherit;
  }
  #test-panel input[type="text"] {
    width: 100%; box-sizing: border-box; padding: 8px 10px;
    background: #0c0c12; border: 1px solid #333; color: #fff;
    border-radius: 6px; font: inherit; margin-bottom: 8px;
  }
  #test-panel button {
    width: 100%; padding: 10px; background: #5a8c3a; color: #fff;
    border: 0; border-radius: 6px; font: inherit; font-weight: 700;
    cursor: pointer; text-transform: uppercase; letter-spacing: .12em;
  }
  #test-panel button:hover { background: #6da849; }
  #test-panel .row { display: flex; gap: 6px; }
  #test-panel .row button { flex: 1; padding: 6px; font-size: 11px; }
  #test-panel .muted { opacity: .6; font-size: 11px; margin-top: 8px; line-height: 1.4; }
  #test-panel .queue { margin-top: 8px; font-size: 11px; opacity: .8; }
  #test-panel label { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; opacity: .85; }

  #hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(255,255,255,.55); font: 600 14px/1.4 ui-monospace, Menlo, monospace;
    text-align: center; pointer-events: none;
    background: rgba(0,0,0,.4); padding: 14px 20px; border-radius: 8px;
    border: 1px dashed rgba(255,255,255,.25);
  }
  #hint.hide { display: none; }
</style>
</head>
<body>

  <div id="loot-container"></div>

  <div id="status"><span class="label">высадка</span><span class="dots">.</span></div>

  <div id="shadow">
    <svg viewBox="0 0 180 32">
      <ellipse cx="90" cy="20" rx="80" ry="10" fill="#000" opacity="0.35"/>
      <ellipse cx="90" cy="18" rx="60" ry="6" fill="#000" opacity="0.25"/>
      <ellipse cx="90" cy="16" rx="90" ry="14" fill="none" stroke="#a8c878" stroke-width="1" opacity="0.25"/>
    </svg>
  </div>

  <div id="hero">
    <svg viewBox="0 0 280 380" id="hero-svg">
      <g id="parachute">

        </g>
        <g>
          <path d="M 30 110 Q 30 30 70 30 L 70 110 Q 50 100 30 110 Z" fill="#3d6b2d" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <path d="M 70 30 L 110 30 L 110 110 Q 90 100 70 110 L 70 30 Z" fill="#d8c89a" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <path d="M 110 30 L 170 30 L 170 110 Q 150 100 140 110 Q 130 100 110 110 L 110 30 Z" fill="#3d6b2d" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <path d="M 170 30 L 210 30 L 210 110 Q 190 100 170 110 L 170 30 Z" fill="#d8c89a" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <path d="M 210 30 Q 250 30 250 110 Q 230 100 210 110 L 210 30 Z" fill="#3d6b2d" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
          <path d="M 30 110 Q 30 95 35 90 Q 30 100 30 110 Z M 70 110 Q 65 100 70 90 L 70 110 Z M 110 110 Q 105 100 110 90 L 110 110 Z M 170 110 Q 165 100 170 90 L 170 110 Z M 210 110 Q 205 100 210 90 L 210 110 Z M 250 110 Q 250 100 245 92 L 250 110 Z" fill="#000" opacity="0.18"/>
          <circle cx="140" cy="28" r="6" fill="#fff" stroke="#000" stroke-width="3"/>
        </g>

      <g id="body">
        <g id="backpack">

          <rect x="98" y="255" width="10" height="8" rx="1" fill="#3a2e1a" stroke="#000" stroke-width="1.8"/>

        <g id="leg-left">

          <rect x="178" y="245" width="20" height="55" rx="6" fill="#4a5d2a" stroke="#000" stroke-width="4"/>
          <rect x="178" y="245" width="6" height="55" rx="2" fill="#000" opacity="0.2"/>
          <circle cx="188" cy="305" r="13" fill="#f4c8a8" stroke="#000" stroke-width="4"/>

        </g>

        <g id="head" style="transform-origin: 140px 220px;">

        </g>
      </g>

      <g id="surprise" opacity="0">
        <g transform="translate(195 165)">
          <path d="M 0 0 L -4 -28 L 4 -28 Z" fill="#ffd84d" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>

    </svg>
  </div>
</div>

<div id="test-panel">
  <h3>Paratrooper Alert</h3>
  <input type="text" id="test-nick" placeholder="nickname" value="ДядяВасян_228">
  <button id="test-fire">Trigger Alert</button>
  <div class="row" style="margin-top:8px">
    <button id="test-multi">Queue x3</button>
    <button id="test-clear">Clear</button>
  </div>
  <label><input type="checkbox" id="toggle-music"> фон. музыка</label>
  <div class="queue" id="queue-status">queue: 0 · idle</div>
  <div class="muted">
    URL: <code>?test=1</code> панель · <code>?bg=1</code> фон<br>
    JS: <code>fireFollowerAlert("nick")</code>
  </div>
</div>

<div id="hint">
  Twitch Follower Alert · 1920x1080 · transparent overlay<br>
  Откройте с <code>?test=1</code> для теста
</div>

<script src="alert-engine.js?v=11"></script>
<script>
// WS client — bridges ttweaks backend to alert engine
(function () {
  var WS_URL = 'ws://127.0.0.1:7891/ws';
  var GROUP_ID = '__alert__';
  var ws;

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = function () {
      ws.send(JSON.stringify({ type: 'register', groupId: GROUP_ID }));
    };
    ws.onmessage = function (event) {
      var msg;
      try { msg = JSON.parse(event.data); } catch (e) { return; }
      if (msg.type === 'fire_alert' && typeof window.fireFollowerAlert === 'function') {
        window.fireFollowerAlert(msg.nick || 'AnonGuest');
      }
      if (msg.type === 'alert_config' && typeof window.applyAlertConfig === 'function') {
        window.applyAlertConfig(msg.config);
      }
    };
    ws.onclose = function () { setTimeout(connect, 3000); };
    ws.onerror = function () { /* handled by onclose */ };
  }

  connect();
})();
</script>
</body>
</html>
